name: Dispatch ruyi-package-ci

on:
  push:
    tags:
      - '*'

jobs:
  dispatch-ruyi-package-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Dispatch ruyi-package-ci
        uses: benc-uk/workflow-dispatch@v1
        with:
          token: ${{ secrets.GHA_PAT_RUYI_PACKAGE_CI_RW }}
          repo: ruyisdk/ruyi-package-ci
          ref: master
          workflow: deb.yml
          inputs: '{"ruyi_deb_ref": "${{ github.ref_name }}"}'
